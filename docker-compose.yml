services:
  backend:
    image: slawekradzyminski/backend:3.6.8
    ports:
      - "4001:4001"
    hostname: backend
    environment:
      SPRING_PROFILES_ACTIVE: local
      SWAGGER_UI_OAUTH2_REDIRECT_URL: http://localhost:4001/swagger-ui/oauth2-redirect.html
      # Point the backend at the Ollama mock container instead of localhost
      OLLAMA_BASE_URL: http://ollama-mock:11434
    networks:
      - my-private-ntwk
  ollama-mock:
    image: slawekradzyminski/ollama-mock:local-qwen35-2b
    restart: always
    ports:
      - "11434:11434"
    networks:
      - my-private-ntwk
networks:
  my-private-ntwk:
    driver: bridge
