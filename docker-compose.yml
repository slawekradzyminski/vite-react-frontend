services:
  backend:
    image: ${BACKEND_IMAGE:-slawekradzyminski/backend:3.6.9}
    ports:
      - "4001:4001"
    hostname: backend
    environment:
      SPRING_PROFILES_ACTIVE: local
      SWAGGER_UI_OAUTH2_REDIRECT_URL: http://localhost:4001/swagger-ui/oauth2-redirect.html
      # Point the backend at the Ollama mock container instead of localhost
      OLLAMA_BASE_URL: http://ollama-mock:11434
      APP_SSO_ENABLED: "true"
      APP_SSO_ISSUER_URI: http://localhost:8082/realms/awesome-testing
      APP_SSO_JWK_SET_URI: http://keycloak:8080/realms/awesome-testing/protocol/openid-connect/certs
      APP_SSO_AUDIENCE: awesome-testing-frontend
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: http://localhost:8081,http://127.0.0.1:8081
    depends_on:
      - keycloak
      - ollama-mock
    networks:
      - my-private-ntwk
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    restart: always
    command:
      - start-dev
      - --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8082:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    networks:
      - my-private-ntwk
  ollama-mock:
    image: slawekradzyminski/ollama-mock:local-qwen35-2b
    restart: always
    ports:
      - "11434:11434"
    networks:
      - my-private-ntwk
networks:
  my-private-ntwk:
    driver: bridge
